

services:
  # ================================
  # PostgreSQL with pgvector
  # ================================
  postgres:
    image: pgvector/pgvector:pg16
    container_name: sibyl-sql-postgres
    environment:
      POSTGRES_DB: cognitive_db_agent
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-sibyl_sql_dev_password}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database:/docker-entrypoint-initdb.d  # Auto-run SQL files on first start
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d cognitive_db_agent"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - sibyl-sql-network

  # ================================
  # NOTE: Ollama runs natively on the host at port 11434.
  # Containers reach it via host.docker.internal:11434
  # ================================

  # ================================
  # FastAPI Backend
  # ================================
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: sibyl-sql-backend
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=cognitive_db_agent
      - DB_USER=postgres
      - DB_PASSWORD=${DB_PASSWORD:-sibyl_sql_dev_password}
      - LLM_PROVIDER=${LLM_PROVIDER:-ollama}
      - LLM_MODEL=${LLM_MODEL:-llama3.1:8b}
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
      - GOOGLE_API_KEY=${GOOGLE_API_KEY:-not-needed-for-ollama}
      - SECRET_KEY=${SECRET_KEY:-docker-dev-secret-key-change-in-production}
      - CORS_ORIGINS=http://localhost:5173,http://localhost:3000
      - ENVIRONMENT=development
      - LOG_LEVEL=INFO
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - sibyl-sql-network
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"  # Allows container to reach host's Ollama on Linux

  # ================================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: sibyl-sql-frontend
    environment:
      - VITE_API_URL=http://localhost:8000
    ports:
      - "5173:5173"
    depends_on:
      - backend
    networks:
      - sibyl-sql-network
    restart: unless-stopped

# ================================
# Volumes
# ================================
volumes:
  postgres_data:
    name: sibyl-sql-postgres-data


# ================================
# Networks
# ================================
networks:
  sibyl-sql-network:
    name: sibyl-sql-network
    driver: bridge
